<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa zápasů</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .matches-list { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .match-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .match-item h4 { color: var(--accent-hover); margin-bottom: 5px; }
        .match-item p { margin-bottom: 10px; font-size: 0.9rem; color: var(--text-muted); }
        .report-form { margin-top: 15px; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px; display: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SPŠT E-sport ADMIN</div>
        <div class="menu-toggle" id="menu-toggle">☰</div>
        <nav id="nav-menu">
            <ul>
               <li><a href="dashboard.html">Dashboard</a></li>
               <li><a href="../index.html">Web</a></li>
               <li><a id="logoutBtn" href="#">Odhlásit</a></li>
            </ul>
         </nav>
    </header>

    <section class="admin-panel" style="max-width: 800px; margin: 0 auto;">
        <h1>Správa zápasů</h1>
        
        <form id="matchForm" class="admin-form">
            <h3>Naplánovat nový zápas</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="opponent" placeholder="Soupeř (např. Gymnázium Třebíč)" required style="flex: 2;">
                <input type="text" id="game" placeholder="Hra (např. CS2, LoL)" required style="flex: 1;">
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="match_date" required style="flex: 1;">
                <input type="time" id="match_time" required style="flex: 1;">
            </div>
            <button type="submit" style="margin-top: 15px;">Přidat zápas</button>
        </form>

        <div id="matchesContainer" class="matches-list">
            </div>

        <div id="editMatchContainer" style="display:none; margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="color: var(--accent-hover); margin-bottom: 15px;">Upravit zápas</h3>
            <form id="editMatchForm" class="admin-form">
                <input type="hidden" id="edit_match_id">

                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="edit_opponent" placeholder="Soupeř" required style="flex: 2;">
                    <input type="text" id="edit_game" placeholder="Hra" required style="flex: 1;">
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="date" id="edit_match_date" required style="flex: 1;">
                    <input type="time" id="edit_match_time" required style="flex: 1;">
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
                    <label for="edit_status" style="min-width: 80px; color: var(--text-muted);">Stav:</label>
                    <select id="edit_status" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: #fff;">
                        <option value="upcoming">Nadcházející</option>
                        <option value="finished">Odehraný</option>
                    </select>
                </div>

                <input type="text" id="edit_score" placeholder="Skóre (např. 2:1)">
                <textarea id="edit_report" rows="4" placeholder="Report zápasu"></textarea>

                <div style="margin-top: 15px;">
                    <button type="submit">Uložit změny</button>
                    <button type="button" onclick="closeEditMatchForm()" style="background: #555; margin-left: 10px;">Zrušit</button>
                </div>
            </form>
        </div>
    </section>

    <script src="../js/navbar.js"></script>
    <script src="../js/admin/sprava-zapasu.js"></script>
</body>
</html>
