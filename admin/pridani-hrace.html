<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Přidat hráče</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>

<div class="logo">SPŠT E-sport ADMIN</div>

<nav>
<ul>

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="../index.html">Web</a></li>

</ul>
</nav>

</header>


<section class="admin-panel">

<h1>Přidat hráče</h1>

<form id="playerForm" class="admin-form">

<input type="text" id="name" placeholder="Jméno hráče" required>

<input type="text" id="role" placeholder="Role (např. IGL / Captain)" required>

<input type="text" id="game" placeholder="Hra (např. CS2, LoL)" required>

<input type="file" id="photo" accept="image/*">

<textarea id="desc" rows="5" placeholder="Popis hráče"></textarea>

<input type="text" id="instagram" placeholder="Instagram odkaz">

<input type="text" id="twitch" placeholder="Twitch odkaz">

<button type="submit">Přidat hráče</button>

</form>

</section>


<script>

document.getElementById("playerForm").addEventListener("submit", function(e){

e.preventDefault();

const name = document.getElementById("name").value;
const role = document.getElementById("role").value;
const game = document.getElementById("game").value;
const desc = document.getElementById("desc").value;
const instagram = document.getElementById("instagram").value;
const twitch = document.getElementById("twitch").value;

const photoFile = document.getElementById("photo").files[0];

let photoURL = "";

if(photoFile){
photoURL = URL.createObjectURL(photoFile);
}

let players = JSON.parse(localStorage.getItem("players")) || [];

players.push({
name:name,
role:role,
game:game,
desc:desc,
photo:photoURL,
instagram:instagram,
twitch:twitch
});

localStorage.setItem("players", JSON.stringify(players));

alert("Hráč byl přidán");

window.location.href = "../hraci.html";

});

</script>

</body>
</html>
