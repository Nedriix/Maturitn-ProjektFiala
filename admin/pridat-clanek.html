<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Přidat článek</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>
<div class="logo">SPŠT E-sport ADMIN</div>

<nav>
<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="../index.html">Web</a></li>
</ul>
</nav>

</header>

<section class="admin-panel">

<h1>Přidat článek</h1>

<form id="articleForm" class="admin-form">

<input type="text" id="title" placeholder="Název článku" required>

<input type="file" id="image" accept="image/*">

<textarea id="content" rows="8" placeholder="Obsah článku" required></textarea>

<button type="submit">Publikovat článek</button>

</form>

</section>

<script>

document.getElementById("articleForm").addEventListener("submit", function(e){

e.preventDefault();

const title = document.getElementById("title").value;
const content = document.getElementById("content").value;
const imageFile = document.getElementById("image").files[0];

let imageURL = "";

if(imageFile){
imageURL = URL.createObjectURL(imageFile);
}

let articles = JSON.parse(localStorage.getItem("articles")) || [];

articles.push({
title:title,
content:content,
image:imageURL
});

localStorage.setItem("articles", JSON.stringify(articles));

alert("Článek byl přidán");

window.location.href = "../clanky.html";

});

</script>

</body>
</html>
