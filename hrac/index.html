<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Hráčský portál - Přihlášení</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">SPŠT E-sport HRÁČI</div>
        <nav><ul><li><a href="../index.html">Zpět na web</a></li></ul></nav>
    </header>

    <section class="auth-page">
        <div class="auth-card">
            <h1>Hráčský portál</h1>
            <form id="playerLoginForm">
                <div class="auth-field">
                    <label>E-mail</label>
                    <input type="email" id="email" required>
                </div>
                <div class="auth-field">
                    <label>Heslo</label>
                    <input type="password" id="password" required>
                </div>
                <button class="auth-btn">Přihlásit se</button>
            </form>
        </div>
    </section>

    <script src="../js/hrac/login.js"></script>
</body>
</html>
