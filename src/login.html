<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení - SPŠT E-sport</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-card h1 { margin-bottom: 10px; color: var(--accent-hover); }
        .auth-card p { margin-bottom: 25px; color: var(--text-muted); }
        .error-box {
            background: rgba(255, 82, 82, 0.2);
            color: #ff5252;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SPŠT E-sport</div>
        <nav><ul><li><a href="index.html">Zpět na web</a></li></ul></nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Přihlášení</h1>
            <p>Vstup pro administrátory i hráče</p>

            <div id="errorBox" class="error-box"></div>

            <form id="loginForm" class="admin-form">
                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="color: var(--text-muted); font-size: 0.85rem;">E-mail</label>
                    <input type="email" id="email" placeholder="vas@email.cz" required>
                </div>
                
                <div style="text-align: left; margin-bottom: 25px;">
                    <label style="color: var(--text-muted); font-size: 0.85rem;">Heslo</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" style="width: 100%;">Vstoupit do systému</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
