<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa hráčů - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .users-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .users-table th, .users-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .users-table th { color: var(--accent-hover); }
        .action-btn { padding: 6px 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem;}
        .btn-edit { background: #b388ff; color: #fff; margin-right: 5px; }
        .btn-delete { background: #ff5252; color: #fff; }
        #editFormContainer { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <header>
        <div class="logo">SPŠT E-sport ADMIN</div>
        <div class="menu-toggle" id="menu-toggle">☰</div>
        <nav id="nav-menu">
            <ul>
               <li><a href="dashboard.html">Dashboard</a></li>
               <li><a href="../index.html">Web</a></li>
               <li><a id="logoutBtn" href="#">Odhlásit</a></li>
            </ul>
         </nav>
    </header>

    <section class="admin-panel" style="max-width: 1000px; margin: 0 auto;">
        <h1>Správa hráčů</h1>
        
        <a href="pridani-hrace.html"><button style="margin-bottom: 20px;">+ Přidat nového hráče</button></a>

        <table class="users-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Jméno</th>
                    <th>E-mail</th>
                    <th>Hra</th>
                    <th>Role</th>
                    <th>Akce</th>
                </tr>
            </thead>
            <tbody id="playersList">
                </tbody>
        </table>

        <div id="editFormContainer" style="display:none;">
            <h3 style="color: var(--accent-hover); margin-bottom: 15px;">Upravit hráče</h3>
            <form id="editPlayerForm" class="admin-form" enctype="multipart/form-data">
                <input type="hidden" id="edit_id">
                
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="edit_name" placeholder="Jméno hráče" required style="flex: 1;">
                    <input type="email" id="edit_email" placeholder="Přihlašovací e-mail" required style="flex: 1;">
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="edit_game" placeholder="Hra (např. CS2)" required style="flex: 1;">
                    <input type="text" id="edit_role" placeholder="Role (např. Kapitán)" style="flex: 1;">
                </div>

                <textarea id="edit_description" rows="4" placeholder="Popis hráče" style="margin-bottom: 10px;"></textarea>

                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="edit_instagram" placeholder="Instagram odkaz" style="flex: 1;">
                    <input type="text" id="edit_twitch" placeholder="Twitch odkaz" style="flex: 1;">
                </div>

                <div style="margin-bottom: 10px;">
                    <input type="file" id="edit_photo" accept="image/*">
                    <small id="edit_current_photo" style="display:block; margin-top: 6px; opacity: .85;"></small>
                    <label id="edit_remove_photo_wrap" style="display:block; margin-top: 8px; font-size: .92rem;">
                        <input type="checkbox" id="edit_remove_photo"> Smazat aktuální fotku
                    </label>
                </div>
                
                <input type="text" id="edit_password" placeholder="Nové heslo (vyplňte jen pokud ho chcete změnit)">
                
                <div style="margin-top: 15px;">
                    <button type="submit">Uložit změny</button>
                    <button type="button" onclick="closeEditForm()" style="background: #555; margin-left: 10px;">Zrušit</button>
                </div>
            </form>
        </div>
    </section>

    <script src="../js/navbar.js"></script>
    <script src="../js/admin/sprava-hracu.js"></script>
</body>
</html>
