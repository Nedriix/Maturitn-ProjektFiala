<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa Play-off</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .playoff-admin {
            max-width: 1320px;
            margin: 0 auto;
            text-align: left;
        }

        .playoff-admin-intro {
            max-width: 760px;
            margin: 0 auto 28px;
            text-align: center;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .playoff-editor {
            display: grid;
            grid-template-columns: 1fr 0.9fr 1fr;
            gap: 22px;
            align-items: start;
        }

        .editor-column {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .editor-column-title {
            font-family: "Rajdhani", sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent-hover);
            margin: 0 0 4px;
            text-align: center;
        }

        .editor-group {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .editor-group h3 {
            margin: 0 0 6px;
            font-size: 1.15rem;
        }

        .editor-group-note {
            color: var(--text-muted);
            font-size: 0.92rem;
            margin: 0 0 14px;
        }

        .match-group {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .match-group:last-child {
            margin-bottom: 0;
        }

        .match-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .match-group-header strong {
            font-family: "Rajdhani", sans-serif;
            font-size: 1rem;
            letter-spacing: 0.6px;
        }

        .match-order {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .team-input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .field-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .field-group input {
            width: 100%;
            margin: 0;
        }

        .champion-group {
            background: linear-gradient(180deg, rgba(126,87,194,0.16), rgba(255,255,255,0.04));
            border: 1px solid rgba(149,117,205,0.25);
        }

        .champion-group .field-group input {
            font-size: 1rem;
            font-weight: 600;
        }

        .editor-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 24px;
            padding: 16px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
        }

        .save-status {
            min-height: 24px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .save-status.success {
            color: #89d68c;
        }

        .save-status.error {
            color: #ff9b9b;
        }

        .save-status.saving {
            color: #d6c78d;
        }

        @media (max-width: 1100px) {
            .playoff-editor {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .team-input-grid {
                grid-template-columns: 1fr;
            }

            .editor-actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SPŠT E-sport ADMIN</div>
        <div class="menu-toggle" id="menu-toggle">☰</div>
        <nav id="nav-menu">
            <ul>
               <li><a href="dashboard.html">Dashboard</a></li>
               <li><a href="../index.html">Web</a></li>
               <li><a id="logoutBtn" href="#">Odhlásit</a></li>
            </ul>
         </nav>
    </header>

    <section class="admin-panel playoff-admin">
        <h1>Správa pavouka</h1>
        <p class="playoff-admin-intro">Editor je rozdělený podle levé větve, finále a pravé větve. U každého zápasu vyplň pořadí týmů přesně tak, jak se má zobrazit na webu.</p>
        <form id="playoffForm" class="admin-form" style="max-width: 100%;">
            <div class="playoff-editor" id="form-container"></div>

            <div class="editor-actions">
                <div id="saveStatus" class="save-status">Změny ještě nejsou uložené.</div>
                <button type="submit">Uložit pavouka</button>
            </div>
        </form>
    </section>

    <script src="../js/navbar.js"></script>
    <script src="../js/admin/sprava-playoff.js"></script>
</body>
</html>
