<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Články - SPŠT E-sport</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- HLAVIČKA -->
<header>

<div class="logo">SPŠT E-sport</div>

<div class="menu-toggle" id="menu-toggle">☰</div>

<nav id="nav-menu">
<ul>

<li><a href="index.html">Domů</a></li>
<li><a href="index.html#program">Program</a></li>
<li><a href="hraci.html">Hráči</a></li>
<li><a href="clanky.html">Články</a></li>
<li><a href="index.html#kontakt">Kontakt</a></li>

</ul>
</nav>

</header>


<!-- SEKCE ČLÁNKY -->
<section class="players-section">

<h2>Články a novinky</h2>

<p class="players-text">
Zde najdete všechny novinky a články ze školního e-sport týmu.
</p>

<div id="articles"></div>

</section>


<!-- PATIČKA -->
<footer>
&copy; 2025 SPŠT E-sport Tým | Všechna práva vyhrazena.
</footer>


<script>

const container = document.getElementById("articles");

let articles = JSON.parse(localStorage.getItem("articles")) || [];

articles.forEach((article, index) => {

const div = document.createElement("div");

div.classList.add("game-block");

div.innerHTML = `

<h3>${article.title}</h3>

${article.image ? `<img src="${article.image}" style="max-width:100%;border-radius:10px;margin:15px 0;">` : ""}

<p>${article.content.substring(0,120)}...</p>

<button class="btn">Číst více</button>

`;

div.addEventListener("click", () => {

localStorage.setItem("selectedArticle", JSON.stringify(article));

window.location.href = "clanek.html";

});

container.appendChild(div);

});


/* HAMBURGER MENU */

const toggle = document.getElementById("menu-toggle");
const nav = document.getElementById("nav-menu");

toggle.addEventListener("click", () => {
nav.classList.toggle("active");
});

</script>

</body>
</html>
